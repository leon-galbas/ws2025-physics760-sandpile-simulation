# general matplotlib setup
matplotlib_setup:
  figure.figsize: [3.4, 2.4]
  font.size: 9
  axes.labelsize: 9
  xtick.labelsize: 8
  ytick.labelsize: 8
  legend.fontsize: 6
  lines.linewidth: 1.0
  axes.linewidth: 0.8
  xtick.direction: "in"
  ytick.direction: "in"
# parameters for the scaling windows per model configuration
scaling_window:
  default:
    window_size: 10
    window_step_size: 1
    r_thresh: 0.8
    deviation_factor: 2.0
  A:
    window_size: 25
  B:
    window_size: 25
  C:
    window_size: 25
